name: deploy

on:
  push:
    branches: [main]
  # also runs when you manually trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed to commit updated index.html back
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          # fetch full history so the commit step works cleanly
          fetch-depth: 0

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Regenerate index.html based on whatever tool folders exist
      - name: regenerate index
        run: python3 index.py --write

      # If index.py changed index.html, commit that back to main
      # so the repo stays in sync with what's deployed.
      - name: commit updated index.html (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore: regenerate index [skip ci]"
            git push
          fi

      # Upload the whole repo as the Pages artifact
      - name: setup pages
        uses: actions/configure-pages@v5

      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: deploy to github pages
        id: deployment
        uses: actions/deploy-pages@v4
